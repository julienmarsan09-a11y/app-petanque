<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Pétanque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0C10; --surface: #111318; --surface2: #181C24;
            --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
            --accent: #F5A623; --accent2: #FF6B35;
            --green: #22C55E; --red: #EF4444;
            --text: #F0F2F5; --text2: #8B95A3; --text3: #5A6170;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(245,166,35,0.1) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 90% 90%, rgba(255,107,53,0.06) 0%, transparent 50%);
        }

        .box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            animation: slideUp .3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(16px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 8px 24px rgba(245,166,35,0.3);
        }

        h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .03em;
            color: var(--text);
        }

        .sub { color: var(--text3); font-size: .82rem; margin-top: .15rem; }

        .form-group { margin-bottom: 1rem; }

        label {
            display: block;
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--text3);
            margin-bottom: .35rem;
        }

        input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 10px;
            padding: .75rem 1rem;
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            font-size: .95rem;
            transition: border-color .18s, box-shadow .18s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(245,166,35,0.12);
        }

        input::placeholder { color: var(--text3); }

        .btn-login {
            width: 100%;
            padding: .8rem;
            background: var(--accent);
            color: #0A0C10;
            border: none;
            border-radius: 10px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.05rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .06em;
            cursor: pointer;
            margin-top: .5rem;
            transition: all .18s;
        }

        .btn-login:hover { background: #F0B832; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(245,166,35,0.3); }

        .hint {
            margin-top: 1.25rem;
            padding: .75rem 1rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: .8rem;
            color: var(--text3);
            text-align: center;
        }
        .hint strong { color: var(--text2); }

        .flash {
            padding: .7rem 1rem;
            border-radius: 8px;
            font-size: .88rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        .flash.error   { background: rgba(239,68,68,0.1);  color: #F87171; border: 1px solid rgba(239,68,68,0.2); }
        .flash.warning { background: rgba(245,166,35,0.1); color: var(--accent); border: 1px solid rgba(245,166,35,0.2); }
        .flash.success { background: rgba(34,197,94,0.1);  color: #4ADE80; border: 1px solid rgba(34,197,94,0.2); }
        .flash.info    { background: rgba(59,130,246,0.1); color: #60A5FA; border: 1px solid rgba(59,130,246,0.2); }
    </style>
</head>
<body>
<div class="box">
    <div class="logo-wrap">
        <div class="logo-icon">🎯</div>
        <div>
            <h1>Pétanque</h1>
            <div class="sub">Gestionnaire de concours</div>
        </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="form-group">
            <label>Identifiant</label>
            <input type="text" name="username" placeholder="admin" required autofocus autocomplete="username">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="mdp" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">Se connecter →</button>
    </form>

    <div class="hint">
        Première connexion : <strong>admin</strong> / <strong>petanque</strong>
    </div>
</div>
</body>
</html>
